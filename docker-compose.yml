services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-wallet-postgres
    environment:
      POSTGRES_USER: smart_wallet
      POSTGRES_PASSWORD: smart_wallet
      POSTGRES_DB: smart_wallet
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_wallet -d smart_wallet"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: smart-wallet-api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://smart_wallet:smart_wallet@postgres:5432/smart_wallet
    command: >
      sh -c "python -m alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
